<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — WC 2026 Live</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0e27 0%, #1a2456 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
    }
    .trophy { font-size: 80px; margin-bottom: 20px; }
    h1 { font-size: 2rem; margin-bottom: 12px; color: #FFD700; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 8px; line-height: 1.6; }
    .retry {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 32px;
      background: #FFD700;
      color: #0a0e27;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .retry:hover { background: #ffe44d; }
    .status { margin-top: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <div class="trophy">🏆</div>
    <h1>You're Offline</h1>
    <p>No internet connection right now.</p>
    <p>WC 2026 Live requires a connection for live scores and match updates.</p>
    <a class="retry" onclick="window.location.reload()">Try Again</a>
    <p class="status">Goal alerts will resume when you're back online.</p>
  </div>
  <script>
    // Auto-reload when connection returns
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
