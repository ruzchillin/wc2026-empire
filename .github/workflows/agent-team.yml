name: WC2026 Empire Agent Team (24/7)

on:
  # Run continuously — each job runs for up to 6 hours, then restarts
  schedule:
    - cron: '0 */5 * * *'   # Restart every 5 hours (well within 6h limit)
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5 hours max per run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Agent Team
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SITE_URL: https://wc2026-sports-empire.vercel.app
        run: |
          echo "🤖 Starting WC2026 Empire Agent Team..."
          node telegram-agents.js
